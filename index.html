<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini Tienda</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header>
      <h1>Mi Tienda</h1>

      <div>
        <button>🛒 Carrito</button> 

        <div> 
          <h2>Carrito</h2>

          <ul>
            <li>Camiseta - $12.00</li>
            <li>Zapatos - $35.00</li>
          </ul>

          <button>Comprar</button>
        </div>
      </div>
    </header>

    <main>
      <h2>Productos</h2>

      <ul>
        <li>
          <img src="imagenes/camisa.jpg" alt="Camisa" />

          <h3>Camisa</h3>

          <p>Precio: $12.00</p>

          <button>Agregar al carrito</button>
        </li>

        <li>
          <img src="imagenes/zapatos.webp" alt="Zapatos" />

          <h3>Zapatos</h3>

          <p>Precio: $35.00</p>

          <button>Agregar al carrito</button>
        </li>

        <li>
          <img src="imagenes/mochila.webp" alt="Mochila" />

          <h3>Mochila</h3>

          <p>Precio: $20.00</p>

          <button>Agregar al carrito</button>
        </li>
      </ul>
    </main>
    <dialog open>
      <h2>Resumen de compra</h2>

      <ol>
        <li>Camiseta</li>
        <li>Zapatos</li>
      </ol>

      <button>Cerrar</button>
    </dialog>
    <script src="app.js"></script>
  </body>
</html>
